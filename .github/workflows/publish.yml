name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # manual trigger

permissions:
  contents: read
  id-token: write  # needed for trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
